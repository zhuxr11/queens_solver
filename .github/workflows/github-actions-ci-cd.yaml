name: CI/CD

on:
  push:
    branches:
      - "**"

  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run install-playwright-browsers

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run install-playwright-browsers

      - name: Run tests
        run: |
          uv run pytest -rP --log-cli-level=INFO --cov=. --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  publish:
    name: Publish Version
    runs-on: ubuntu-latest
    needs: tests

    if: |
      github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        run: |
          uv run cz bump --yes --changelog

      - name: Get latest version tag
        id: version
        run: |
          VERSION_TAG=$(git describe --tags --abbrev=0)
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git add .
          git commit -m "bump version to ${VERSION_TAG}" || echo "No changes to commit"

      - name: Push commits and tags
        run: |
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} HEAD:master
          git push --tags https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}

      - name: Check if dev branch exists
        id: check_dev
        run: |
          if git ls-remote --exit-code --heads origin dev; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Rebase dev onto master
        if: steps.check_dev.outputs.exists == 'true'
        run: |
          git fetch origin master
          git fetch origin dev
          git checkout dev
          git rebase origin/master
          git push origin dev

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    if: |
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          git fetch origin master --tags
          git checkout master
          git pull origin master
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: "${{ github.repository }} ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
